---
- name: Create AWS security group
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-1
    vpc_id: vpc-xxxxxxxxxxxxxxxxx
    security_group_name: ansible-practice-sg

  tasks:
    - name: Create security group with SSH and HTTP access
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: Security group created by Ansible
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow SSH

          - proto: tcp
            ports:
              - 80
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow HTTP

        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow all outbound

        state: present
      register: sg_result

    - name: Print security group details
      ansible.builtin.debug:
        msg: "Security group created/found. Group ID is {{ sg_result.group_id }}"

          
      